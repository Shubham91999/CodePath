<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Fair - Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f8fafc;
            min-height: 100vh;
        }
        .admin-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #666;
            font-weight: 600;
        }
        .admin-controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-admin {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary { background: #6366f1; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-info { background: #06b6d4; color: white; }
        .btn-admin:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        .search-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }
        .registrations-table {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .table-header {
            background: #f8fafc;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .table-content {
            max-height: 500px;
            overflow-y: auto;
        }
        .registration-item {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
        }
        .registration-item:last-child {
            border-bottom: none;
        }
        .registration-info h4 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .registration-info p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }
        .registration-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-confirmed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .registration-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .no-registrations {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        @media (max-width: 768px) {
            .registration-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .control-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-cog"></i> STEM Fair Admin Panel</h1>
            <p>Manage registrations and view statistics</p>
        </div>

        <div class="admin-stats" id="adminStats">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <div class="admin-controls">
            <h3>Admin Controls</h3>
            <div class="control-buttons">
                <button class="btn-admin btn-primary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
                <button class="btn-admin btn-success" onclick="exportData()">
                    <i class="fas fa-download"></i> Export CSV
                </button>
                <button class="btn-admin btn-info" onclick="showStatistics()">
                    <i class="fas fa-chart-bar"></i> View Statistics
                </button>
                <button class="btn-admin btn-warning" onclick="clearAllData()">
                    <i class="fas fa-trash"></i> Clear All Data
                </button>
            </div>
            <input type="text" class="search-box" id="searchBox" placeholder="Search registrations by name, email, or phone..." onkeyup="searchRegistrations()">
        </div>

        <div class="registrations-table">
            <div class="table-header">
                <h3>All Registrations</h3>
            </div>
            <div class="table-content" id="registrationsList">
                <!-- Registrations will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // Initialize admin panel
        document.addEventListener('DOMContentLoaded', function() {
            refreshData();
        });

        function refreshData() {
            updateStatistics();
            displayRegistrations();
        }

        function updateStatistics() {
            const stats = window.registrationDB.getStatistics();
            const statsContainer = document.getElementById('adminStats');
            
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.total}</div>
                    <div class="stat-label">Total Registrations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.pending}</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.confirmed}</div>
                    <div class="stat-label">Confirmed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.cancelled}</div>
                    <div class="stat-label">Cancelled</div>
                </div>
            `;
        }

        function displayRegistrations(registrations = null) {
            const data = registrations || window.registrationDB.getAllRegistrations();
            const container = document.getElementById('registrationsList');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="no-registrations">
                        <i class="fas fa-inbox" style="font-size: 3rem; color: #ccc; margin-bottom: 20px;"></i>
                        <h3>No registrations found</h3>
                        <p>Registrations will appear here once people start signing up.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(reg => `
                <div class="registration-item">
                    <div class="registration-info">
                        <h4>${reg.parentName}</h4>
                        <p>${reg.email}</p>
                    </div>
                    <div class="registration-info">
                        <h4>${reg.childName} (Age ${reg.childAge})</h4>
                        <p>${reg.interests ? reg.interests.join(', ') : 'No interests selected'}</p>
                    </div>
                    <div class="registration-info">
                        <p><strong>ID:</strong> ${reg.id}</p>
                        <p><strong>Date:</strong> ${new Date(reg.timestamp).toLocaleDateString()}</p>
                    </div>
                    <div>
                        <span class="registration-status status-${reg.status}">${reg.status}</span>
                        <div class="registration-actions">
                            <button class="action-btn" style="background: #10b981; color: white;" onclick="updateStatus('${reg.id}', 'confirmed')">Confirm</button>
                            <button class="action-btn" style="background: #ef4444; color: white;" onclick="updateStatus('${reg.id}', 'cancelled')">Cancel</button>
                            <button class="action-btn" style="background: #6b7280; color: white;" onclick="deleteRegistration('${reg.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchRegistrations() {
            const query = document.getElementById('searchBox').value;
            if (query.trim() === '') {
                displayRegistrations();
            } else {
                const results = window.registrationDB.searchRegistrations(query);
                displayRegistrations(results);
            }
        }

        function updateStatus(id, status) {
            if (window.registrationDB.updateRegistrationStatus(id, status)) {
                refreshData();
                alert(`Registration ${id} status updated to ${status}`);
            } else {
                alert('Failed to update registration status');
            }
        }

        function deleteRegistration(id) {
            if (confirm('Are you sure you want to delete this registration?')) {
                if (window.registrationDB.deleteRegistration(id)) {
                    refreshData();
                    alert('Registration deleted successfully');
                } else {
                    alert('Failed to delete registration');
                }
            }
        }

        function exportData() {
            window.registrationDB.downloadCSV();
        }

        function showStatistics() {
            const stats = window.registrationDB.getStatistics();
            console.log('Detailed Statistics:', stats);
            alert(`Statistics:\n\nTotal: ${stats.total}\nPending: ${stats.pending}\nConfirmed: ${stats.confirmed}\nCancelled: ${stats.cancelled}\n\nCheck console for detailed breakdown.`);
        }

        function clearAllData() {
            if (confirm('Are you sure you want to clear ALL registration data? This action cannot be undone!')) {
                if (window.registrationDB.clearAllRegistrations()) {
                    refreshData();
                    alert('All registration data has been cleared');
                } else {
                    alert('Failed to clear data');
                }
            }
        }
    </script>
</body>
</html>
